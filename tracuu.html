<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tra Cứu Điểm</title>
</head>
<body>
    <h2>Tra cứu điểm dự án</h2>
    <input type="text" id="mssv" placeholder="Nhập MSSV" required>
    <input type="password" id="matkhau" placeholder="Nhập mật khẩu" required>
    <button onclick="traCuu()">Tra cứu</button>
    
    <div id="ketqua" style="margin-top: 20px;"></div>

    <p><a href="#" onclick="quenMatKhau()">Quên mật khẩu?</a></p>

    <script>
        async function hashData(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function traCuu() {
            const mssv = document.getElementById('mssv').value.trim();
            const matkhau = document.getElementById('matkhau').value.trim();
            const resultDiv = document.getElementById('ketqua');
            
            resultDiv.innerHTML = "Đang tra cứu...";
            
            const chuoiBiMat = `${mssv}_${matkhau}`;
            const hashName = await hashData(chuoiBiMat);
            
            try {
                // Thay 'diem_sinh_vien' bằng đường dẫn folder của bạn trên GitHub
                const response = await fetch(`diem_sinh_vien/${hashName}.json`);
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = `
                        <h3>Kết quả:</h3>
                        <p>Họ tên: ${data.HoTen}</p>
                        <p>Điểm Quá trình: ${data.DiemQT}</p>
                        <p>Điểm Cuối kỳ: ${data.DiemCK}</p>
                        <p>Nhận xét: ${data.NhanXet}</p>
                    `;
                } else {
                    resultDiv.innerHTML = "<p style='color:red;'>Sai MSSV hoặc Mật khẩu.</p>";
                }
            } catch (error) {
                resultDiv.innerHTML = "<p style='color:red;'>Có lỗi xảy ra khi kết nối.</p>";
            }
        }
        
        // Dành cho tính năng Apps Script ở giai đoạn 4
        function quenMatKhau() {
            const mssv = prompt("Vui lòng nhập MSSV của bạn để lấy lại mật khẩu:");
            if(mssv) {
                // Sẽ thay URL_WEB_APP bằng link của Google Apps Script ở Giai đoạn 4
                const urlAppsScript = "https://script.google.com/macros/s/AKfycbzR5YDF0k-7271IXoUpOmNz81TQcO2i2dv1CuEAbA6hUMJk3KIpYo8MZ0GccW4JW99F3g/exec";
                fetch(`URL_WEB_APP?mssv=${mssv}`)
                .then(res => alert("Nếu MSSV hợp lệ, mật khẩu sẽ được gửi vào email sinh viên của bạn."));
            }
        }
    </script>
</body>
</html>
